name: life_rpg
description: "Life RPG - Real-Time Activity Tracker & Gamified Self-Improvement System"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  flutter_riverpod: ^2.5.1

  # Local database
  sqflite: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.3

  # Notifications
  flutter_local_notifications: ^17.2.1+2
  timezone: ^0.9.4
  permission_handler: ^11.3.1

  # Charts
  fl_chart: ^0.68.0

  # Settings
  shared_preferences: ^2.2.3

  # Utilities
  uuid: ^4.4.0
  intl: ^0.19.0
  collection: ^1.18.0

  # CSV export / backup
  csv: ^6.0.0
  share_plus: ^9.0.0
  file_picker: ^8.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
